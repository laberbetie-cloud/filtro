<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Gist Filter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f6f9;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        button {
            background-color: #0076ff;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            width: 100%;
        }
        button:hover {
            background-color: #0060d6;
        }
        button:active {
            transform: scale(0.98);
        }
        #status {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

<div class="card">
    <h1>Bible Text & Question Filter</h1>
    <p>Copy your source study material text first. Then click the button below to extract questions and verses automatically back into your clipboard.</p>
    
    <button onclick="processClipboardGist()">Process Clipboard</button>
    
    <div id="status"></div>
</div>

<script>
async function processClipboardGist() {
    const statusDiv = document.getElementById('status');
    statusDiv.className = '';
    statusDiv.innerText = 'Processing...';

    try {
        // Request and read text from the clipboard
        const text = await navigator.clipboard.readText();
        
        // Regex matches full lines starting with "Question X." or text enclosed in parentheses containing a book reference
        const regex = /(Question\s+\d+\..*)|(\((?:\s+)?[A-Z][a-z]+\.?\s+\d+:\d+(?:[\s\d,;-]*)\))/g;
        
        const matches = text.match(regex);
        
        if (!matches) {
            statusDiv.className = 'error';
            statusDiv.innerText = 'No matching questions or Bible references found.';
            return;
        }
        
        // Format matches by removing stray linebreaks and joining them with new lines
        const cleanList = matches
            .map(item => item.replace(/\n/g, " ").trim())
            .filter(item => item !== "")
            .join('\n');
        
        // Write the filtered list directly back into the clipboard
        await navigator.clipboard.writeText(cleanList);
        
        statusDiv.className = 'success';
        statusDiv.innerText = 'Success! Cleaned list copied to clipboard.';
        
    } catch (err) {
        statusDiv.className = 'error';
        statusDiv.innerText = 'Error: Make sure to grant clipboard access permissions.';
        console.error(err);
    }
}
</script>

</body>
</html>
