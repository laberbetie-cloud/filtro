<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Study Workspace - Unified</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            text-align: center;
            max-width: 520px;
            width: 100%;
        }
        h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 6px; }
        .subtitle { color: #666666; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 20px;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #0076ff;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button {
            border: none; padding: 14px 20px; font-size: 15px;
            font-weight: 600; border-radius: 8px; cursor: pointer;
            transition: all 0.2s ease; width: 100%;
        }
        .btn-primary { background-color: #0076ff; color: white; }
        .btn-primary:hover { background-color: #0060d6; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #218838; }
        button:active { transform: scale(0.99); }
        
        #status { margin-top: 20px; font-size: 14px; font-weight: 500; min-height: 20px; padding: 10px; border-radius: 6px; }
        .success { color: #28a745; background-color: #e8f5e9; }
        .error { color: #dc3545; background-color: #f8d7da; }
    </style>
</head>
<body>

<div class="card">
    <h1>Bible Study Workspace</h1>
    <p class="subtitle">Pega tu artículo de estudio en el cuadro inferior. El sistema creará el mapa de preguntas en memoria y preparará las consultas para BLB.</p>
    
    <!-- CAMPO DE TEXTO FUENTE UNIFICADO -->
    <textarea id="sourceText" placeholder="Pega aquí el texto completo del artículo de estudio o los versículos de BLB..."></textarea>

    <div class="btn-group">
        <!-- ACCIÓN 1: Genera el mapa relacional interno y copia las citas limpias para BLB -->
        <button class="btn-primary" onclick="generateMapAndExtractVerses()">1. Crear Mapa y Cadena para BLB</button>
        
        <!-- ACCIÓN 2: Toma los textos de BLB pegados, los aparea con el mapa y copia el resultado final consolidado -->
        <button class="btn-success" onclick="matchBLBTextWithMap()">2. Parear Versículos y Copiar Cuestionario Final</button>
    </div>
    
    <div id="status"></div>
</div>

<script>

async function generateMapAndExtractVerses() {
    const statusDiv = document.getElementById('status');
    const txtArea = document.getElementById('sourceText');
    statusDiv.className = ''; statusDiv.innerText = 'Generando mapa relacional...';

    let text = txtArea.value;
    if (!text.trim()) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Por favor, pega primero el artículo en el cuadro de texto.';
        return;
    }
    
    text = text.replace(/\u00A0/g, ' '); 
    const lines = text.split('\n');
    // 🛠️ CAMBIO 1: Cambiamos {} por un Array vacío para respetar el orden cronológico
    const mapaEstudio = []; 
    let currentQuestionKey = null; 
    let todasLasCitasBLB = [];
    let principioOrganizador = "";

    const lineasConTexto = lines.map(l => l.trim()).filter(l => l !== "");
    if (lineasConTexto.length >= 2) {
        principioOrganizador = `${lineasConTexto[0]}\n${lineasConTexto[1]}\n\n`;
        localStorage.setItem('principioOrganizador', principioOrganizador);
    }

    const pregRegex = /(?:Question|Pregunta)\s+(\d+(?:-\d+)?)/i;

    // Generamos dinámicamente la lista de libros desde tu 'bookMapping'
    const librosDisponibles = Object.keys(bookMapping)
        .map(b => b.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'))
        .join('|');

    /* 
       🛠️ REGEX MEJORADA:
       Ahora acepta explícitamente combinaciones de números, comas, espacios y guiones tras los dos puntos.
       Esto evita que "Hebrews 5:13, 14" se corte en el 13.
    */
    const extractorCitasRegex = new RegExp(`(?:\\b\\d?\\s*(?:${librosDisponibles}))\\s+\\d+:\\d+(?:(?:\\s*,\\s*|\\s*-\\s*)\\d+)*(?:\\s*;\\s*(?:(?:\\b\\d?\\s*(?:${librosDisponibles}))\\s+)?\\d+:\\d+(?:(?:\\s*,\\s*|\\s*-\\s*)\\d+)*)*`, 'gi');

    lines.forEach(line => {
        const lineClean = line.trim();
        if (!lineClean) return;

        const matchPregunta = lineClean.match(pregRegex);
        if (matchPregunta) {
            currentQuestionKey = matchPregunta[1]; 
            let preguntaTextoLimpio = lineClean.replace(/^(?:Question|Pregunta)\s+\d+(?:-\d+)?\.\s*/i, '');
            //mapaEstudio[currentQuestionKey] = { textoOriginal: preguntaTextoLimpio, citas: [], textosCompletosBLB: [] };
            // 🛠️ CAMBIO 2: Empujamos un objeto al array incluyendo el identificador real como propiedad
            mapaEstudio.push({
                idPregunta: currentQuestionKey, // Guardamos aquí el "1-2", "3", "4", etc.
                textoOriginal: preguntaTextoLimpio, 
                citas: [], 
                textosCompletosBLB: [] 
            });
        }

        if (currentQuestionKey !== null) {
            if (lineClean.toLowerCase().includes("picture") || lineClean.toLowerCase().includes("read") || lineClean.toLowerCase().includes("[image:]")) {
                return;
            }

            const citasEncontradas = lineClean.match(extractorCitasRegex);
            
            if (citasEncontradas) {
                citasEncontradas.forEach(citaCompleta => {
                    const partesCitas = citaCompleta.split(';');
                    let ultimoLibroEstandar = "";
                    let ultimoCapituloBase = "";

                    partesCitas.forEach(parte => {
                        let fragmento = parte.trim();
                        if (!fragmento) return;

                        let libroDetectado = ""; 
                        let libroEstandar = "";

                        for (const [key, value] of Object.entries(bookMapping)) {
                            const runRegex = new RegExp(`^\\b\\d?\\s*${key}\\b`, 'i');
                            if (runRegex.test(fragmento)) { 
                                libroDetectado = key; 
                                libroEstandar = value; 
                                break; 
                            }
                        }

                        if (libroEstandar) {
                            ultimoLibroEstandar = libroEstandar;
                        } else {
                            libroEstandar = ultimoLibroEstandar;
                        }

                        if (libroEstandar) {
                            let numerosCita = fragmento;
                            if (libroDetectado) {
                                numerosCita = fragmento.replace(new RegExp(`^\\b\\d?\\s*${libroDetectado}\\b`, 'i'), '').trim();
                            }

                            // 🛠️ EXTRACCIÓN DEL CAPÍTULO: Capturamos el grupo [1] de manera segura
                            const capMatch = numerosCita.match(/^(\d+):/);
                            if (capMatch && capMatch[1]) {
                                ultimoCapituloBase = capMatch[1]; 
                            }

                            if (ultimoCapituloBase) {
                                let stringVersiculos = numerosCita.includes(':') ? numerosCita.replace(/^\d+:/, '') : numerosCita;
                                
                                // Separar los versículos por comas
                                const versiculosSeparados = stringVersiculos.split(',');

                                versiculosSeparados.forEach(ver => {
                                    let verLimpio = ver.trim(); 
                                    if (!verLimpio) return;

                                    let citaFormateada = "";
                                    
                                    if (verLimpio.includes(':')) {
                                        citaFormateada = `${libroEstandar} ${verLimpio}`;
                                        const nuevoCap = verLimpio.match(/^(\d+):/);
                                        if (nuevoCap && nuevoCap[1]) {
                                            ultimoCapituloBase = nuevoCap[1];
                                        }
                                    } else {
                                        // Usa el capítulo guardado en texto limpio
                                        citaFormateada = `${libroEstandar} ${ultimoCapituloBase}:${verLimpio}`;
                                    }
// 🛠️ CAMBIO 3: Guardamos la cita en el ÚLTIMO elemento insertado en el Array
                                mapaEstudio[mapaEstudio.length - 1].citas.push(citaFormateada);
                                todasLasCitasBLB.push(citaFormateada);
                                    /* mapaEstudio[currentQuestionKey].citas.push(citaFormateada);
                                    todasLasCitasBLB.push(citaFormateada); */
                                });
                            }
                        }
                    });
                });
            }
        }
    });
// 🛠️ CAMBIO 4: Validación de longitud de Array en lugar de llaves del objeto
    if (mapaEstudio.length === 0) {
        statusDiv.className = 'error'; statusDiv.innerText = 'No se estructuró ninguna pregunta. Revisa el formato.';
        return;
    }

    // 🛠️ CAMBIO 5: Limpieza de duplicados adaptada al Array
    mapaEstudio.forEach(bloque => {
        bloque.citas = [...new Set(bloque.citas)];
    });
    /* if (Object.keys(mapaEstudio).length === 0) {
        statusDiv.className = 'error'; statusDiv.innerText = 'No se estructuró ninguna pregunta. Revisa el formato.';
        return;
    }

    // Limpieza de duplicados interna
    for (const key in mapaEstudio) {
        mapaEstudio[key].citas = [...new Set(mapaEstudio[key].citas)];
    } */
// 🌟 NUEVO: CAPTURA DINÁMICA DEL REPASO EN FASE 1 (Desde el texto original del artículo)
    let boxRepasoOriginal = "[Box] How Would You Answer?\n\n";
    let halladoBoxF1 = false;

    lines.forEach((linea, index) => {
        if (linea.toLowerCase().includes("how would you answer") || linea.toLowerCase().includes("cómo respondería")) {
            halladoBoxF1 = true;
            for (let k = index + 1; k < lines.length; k++) {
                let lineaBoxClean = lines[k].trim();
                if (lineaBoxClean.toLowerCase().includes("end of box") || lineaBoxClean.toLowerCase().includes("fin del recuadro")) {
                    boxRepasoOriginal += "[End of box]\n";
                    break;
                }
                if (lineaBoxClean) {
                    // Limpiamos caracteres extraños como el ícono  si ya viene en el texto de origen
                    let textoPregunta = lineaBoxClean.replace(/^[•-]\s*/, '');
                    boxRepasoOriginal += ` ${textoPregunta}\n`;
                }
            }
        }
    });

    if (halladoBoxF1) {
        localStorage.setItem('boxRepasoGuardado', boxRepasoOriginal);
    } else {
        localStorage.setItem('boxRepasoGuardado', "[Box] How Would You Answer?\n\n Preguntas de repaso generales. [End of box]\n\n");
    }

    localStorage.setItem('mapaEstudioActivo', JSON.stringify(mapaEstudio));
    todasLasCitasBLB = [...new Set(todasLasCitasBLB)];
    const blbSearchString = todasLasCitasBLB.join('; ');


    try {
        await navigator.clipboard.writeText(blbSearchString);
        statusDiv.className = 'success'; statusDiv.innerText = '¡Fase 1 Éxito! Cadena copiada para BLB.';
        txtArea.value = ''; 
    } catch (err) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Error al escribir en el portapapeles.';
    }
}




async function matchBLBTextWithMap() {
    const statusDiv = document.getElementById('status');
    const txtArea = document.getElementById('sourceText');
    statusDiv.className = ''; statusDiv.innerText = 'Sincronizando textos...';

    const mapaGuardado = localStorage.getItem('mapaEstudioActivo');
    const principioGuardado = localStorage.getItem('principioOrganizador') || "";
    if (!mapaGuardado) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Error: No existe un mapa activo en memoria.';
        return;
    }
    const mapaEstudio = JSON.parse(mapaGuardado);

    const blbTextoCompleto = txtArea.value;
    if (!blbTextoCompleto.trim()) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Por favor, pega los textos traídos de BLB.';
        return;
    }

    const lineasBLB = blbTextoCompleto.split('\n').map(l => l.trim()).filter(l => l !== "");

    // Sincronización de versículos
    mapaEstudio.forEach(nodo => {
        nodo.textosCompletosBLB = [];
        nodo.citas.forEach(cita => {
            let textosEncontrados = lineasBLB.filter(linea => linea.toLowerCase().includes(cita.toLowerCase()));

            if (textosEncontrados.length === 0) {
                const raizMatch = cita.match(/^(\d?\s*[a-zA-Z0-9áéíóúÁÉÍÓÚñÑ\s\.]+ \d+):/);
                if (raizMatch) {
                    const raizBusqueda = raizMatch[1].toLowerCase().trim() + ":";
                    
                    if (cita.includes('-')) {
                        const rangoNumeros = cita.match(/:(\d+)-(\d+)/);
                        if (rangoNumeros) {
                            const inicio = parseInt(rangoNumeros[1], 10);
                            const fin = parseInt(rangoNumeros[2], 10);
                            textosEncontrados = lineasBLB.filter(linea => {
                                if (!linea.toLowerCase().includes(raizBusqueda)) return false;
                                const numVerMatch = linea.match(/:(\d+)\s/);
                                return numVerMatch ? (parseInt(numVerMatch[1], 10) >= inicio && parseInt(numVerMatch[1], 10) <= fin) : false;
                            });
                        }
                    } else {
                        const verMatch = cita.match(/:(\d+)/);
                        if (verMatch) {
                            const numVerBusqueda = ":" + verMatch[1] + " ";
                            textosEncontrados = lineasBLB.filter(linea => 
                                linea.toLowerCase().includes(raizBusqueda) && linea.toLowerCase().includes(numVerBusqueda.toLowerCase())
                            );
                        }
                    }
                }
            }
            if (textosEncontrados.length > 0) {
                textosEncontrados.forEach(linea => nodo.textosCompletosBLB.push(linea));
            }
        });
    });

    // Construcción del texto consolidado
    let textoFinalConsolidado = principioGuardado;

    mapaEstudio.forEach(nodo => {
        textoFinalConsolidado += `${nodo.idPregunta}. ${nodo.textoOriginal}\n`;
        if (nodo.textosCompletosBLB.length > 0) {
            const versiculosUnicos = [...new Set(nodo.textosCompletosBLB)];
            versiculosUnicos.forEach(vTxt => { textoFinalConsolidado += `   [BLB] ${vTxt}\n`; });
        } else if (nodo.citas.length > 0) {
            const citasUnicas = [...new Set(nodo.citas)];
            textoFinalConsolidado += `   [Pendiente] Citas: ${citasUnicas.join(', ')}\n`;
        }
        textoFinalConsolidado += `\n`; 
    });

    // 🛠️ CAPTURA DINÁMICA DEL REPASO FINAL (Elimina las preguntas viejas del código)
    let halladoBoxRepaso = false;
    let stringBoxRepaso = "[Box] How Would You Answer?\n\n";

    lineasBLB.forEach((linea, index) => {
        if (linea.toLowerCase().includes("how would you answer") || linea.toLowerCase().includes("cómo respondería")) {
            halladoBoxRepaso = true;
            // Capturamos las líneas siguientes hasta encontrar el cierre del box
            for (let k = index + 1; k < lineasBLB.length; k++) {
                if (lineasBLB[k].toLowerCase().includes("end of box") || lineasBLB[k].toLowerCase().includes("fin del recuadro")) {
                    stringBoxRepaso += "[End of box]\n";
                    break;
                }
                if (lineasBLB[k]) stringBoxRepaso += ` ${lineasBLB[k]}\n`;
            }
        }
    });

    // Si encontramos el recuadro real en el texto pegado lo inyectamos, si no, dejamos uno genérico limpio
    /*if (halladoBoxRepaso) {
        textoFinalConsolidado += stringBoxRepaso + "\n";
    } else {
        textoFinalConsolidado += "[Box] How Would You Answer?\n\n Preguntas de repaso generales. [End of box]\n\n";
    }*/
   // 🌟 NUEVO: Inyectamos el Box real recuperado desde la Fase 1
    const boxFinalReal = localStorage.getItem('boxRepasoGuardado') || "";
    textoFinalConsolidado += boxFinalReal + "\n";


    try {
        await navigator.clipboard.writeText(textoFinalConsolidado.trim());
        statusDiv.className = 'success'; statusDiv.innerText = '¡Fase 2 Éxito! Cuestionario completo copiado al portapapeles.';
        txtArea.value = ''; 
        localStorage.removeItem('mapaEstudioActivo'); 
        localStorage.removeItem('principioOrganizador'); 
    } catch (err) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Error al escribir el resultado final.';
    }
}




</script>
