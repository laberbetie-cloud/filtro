<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Study Workspace - Unified</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            text-align: center;
            max-width: 520px;
            width: 100%;
        }
        h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 6px; }
        .subtitle { color: #666666; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 20px;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #0076ff;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button {
            border: none; padding: 14px 20px; font-size: 15px;
            font-weight: 600; border-radius: 8px; cursor: pointer;
            transition: all 0.2s ease; width: 100%;
        }
        .btn-primary { background-color: #0076ff; color: white; }
        .btn-primary:hover { background-color: #0060d6; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #218838; }
        button:active { transform: scale(0.99); }
        
        #status { margin-top: 20px; font-size: 14px; font-weight: 500; min-height: 20px; padding: 10px; border-radius: 6px; }
        .success { color: #28a745; background-color: #e8f5e9; }
        .error { color: #dc3545; background-color: #f8d7da; }
    </style>
</head>
<body>

<div class="card">
    <h1>Bible Study Workspace</h1>
    <p class="subtitle">Pega tu artículo de estudio en el cuadro inferior. El sistema creará el mapa de preguntas en memoria y preparará las consultas para BLB.</p>
    
    <!-- CAMPO DE TEXTO FUENTE UNIFICADO -->
    <textarea id="sourceText" placeholder="Pega aquí el texto completo del artículo de estudio o los versículos de BLB..."></textarea>

    <div class="btn-group">
        <!-- ACCIÓN 1: Genera el mapa relacional interno y copia las citas limpias para BLB -->
        <button class="btn-primary" onclick="generateMapAndExtractVerses()">1. Crear Mapa y Cadena para BLB</button>
        
        <!-- ACCIÓN 2: Toma los textos de BLB pegados, los aparea con el mapa y copia el resultado final consolidado -->
        <button class="btn-success" onclick="matchBLBTextWithMap()">2. Parear Versículos y Copiar Cuestionario Final</button>
    </div>
    
    <div id="status"></div>
</div>

<script>
const bookMapping = {
    "romans": "Rom", "rom": "Rom", "matthew": "Mat", "mat": "Mat",
    "1 thessalonians": "1Th", "1 th": "1Th", "2 corinthians": "2Co", "2 cor": "2Co",
    "acts": "Act", "1 kings": "1Ki", "2 timothy": "2Ti", "habakkuk": "Hab",
    "james": "Jam", "ecclesiastes": "Ecc", "isaiah": "Isa", "proverbs": "Pro",
    "1 john": "1Jn", "1 jn": "1Jn", "gén": "Gen", "éx": "Exo", "luc": "Luk", "mar": "Mrk",
    "1 peter": "1Pe", "1 pet": "1Pe", "john": "Jhn", "jn": "Jhn"
};

async function generateMapAndExtractVerses() {
    const statusDiv = document.getElementById('status');
    const txtArea = document.getElementById('sourceText');
    statusDiv.className = ''; statusDiv.innerText = 'Generando mapa relacional...';

    let text = txtArea.value;
    if (!text.trim()) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Por favor, pega primero el artículo en el cuadro de texto.';
        return;
    }
    
    text = text.replace(/\u00A0/g, ' '); 
    const lines = text.split('\n');
    const mapaEstudio = {};
    let activeKey = null; // Llave activa flexible (puede ser "1", "14-15", etc.)
    let todasLasCitasBLB = [];
    let principioOrganizador = "";
    
    // Semáforos de control de bloques
    let dentroDeRecuadro = false;
    let dentroDeNota = false;

    const agrupadorCitasBLB = {};

    const lineasConTexto = lines.map(l => l.trim()).filter(l => l !== "");
    if (lineasConTexto.length >= 2) {
        principioOrganizador = `${lineasConTexto}\n${lineasConTexto}\n\n`;
        localStorage.setItem('principioOrganizador', principioOrganizador);
    }

    // REGEX ESTRICTA: Exige que inicie con número y lleve obligatoriamente punto o guion oficial posterior
        // 🎯 CANDADO ESTRICTO: Exige un punto (.) o un guion (-) inmediatamente después del número inicial
    const pregRegex = /^\s*\d+[\d\s,.-]*(?:[a-z]\))?[\s]*[.-]+\s*.*\?.*/i;

    const citaRegex = /\(([^)]+)\)/g;

    const traductorEspanolBLB = {
        "mateo": "Mat", "marcos": "Mrk", "lucas": "Luk", "juan": "Jhn", "hechos": "Act",
        "romanos": "Rom", "1 corintios": "1Co", "2 corintios": "2Co", "galatas": "Gal", 
        "gálatas": "Gal", "efesios": "Eph", "filipenses": "Phl", "colosenses": "Col", 
        "1 tesalonicenses": "1Th", "2 tesalonicenses": "2Th", "1 timoteo": "1Ti", 
        "2 timoteo": "2Ti", "tito": "Tit", "filemon": "Phm", "filemón": "Phm", "hebreos": "Heb", 
        "santiago": "Jam", "1 pedro": "1Pe", "2 pedro": "2Pe", "1 juan": "1Jn", "2 juan": "2Jn", 
        "3 juan": "3Jn", "judas": "Jud", "revelacion": "Rev", "revelación": "Rev", 
        "apocalipsis": "Rev", "génesis": "Gen", "genesis": "Gen", "éxodo": "Exo", "exodo": "Exo", 
        "levítico": "Lev", "levitico": "Lev", "números": "Num", "numeros": "Num", 
        "deuteronomio": "Deu", "josué": "Jos", "josue": "Jos", "jueces": "Jdg", "rut": "Rut", 
        "1 samuel": "1Sa", "2 samuel": "2Sa", "1 reyes": "1Ki", "2 reyes": "2Ki", 
        "1 crónicas": "1Ch", "1 cronicas": "1Ch", "2 crónicas": "2Ch", "2 cronicas": "2Ch", 
        "esdras": "Ezr", "nehemías": "Neh", "nehemiass": "Neh", "ester": "Est", "job": "Job", 
        "salmo": "Psa", "salmos": "Psa", "proverbios": "Pro", "eclesiastés": "Ecc", 
        "eclesiastes": "Ecc", "cantar de los cantares": "Sng", "cantares": "Sng", "isaías": "Isa", 
        "isaias": "Isa", "jeremías": "Jer", "jeremias": "Jer", "lamentaciones": "Lam", 
        "ezequiel": "Ezk", "daniel": "Dan", "oseas": "Hos", "joel": "Joe", "amós": "Amo", 
        "amos": "Amo", "abdías": "Oba", "abdias": "Oba", "jonás": "Jon", "jonas": "Jon", 
        "miqueas": "Mic", "nahúm": "Nah", "nahum": "Nah", "habacuc": "Hab", "sofonías": "Zep", 
        "sofonias": "Zep", "hageo": "Hag", "zacarías": "Zec", "zacarias": "Zec", "malaquías": "Mal", 
        "malaquias": "Mal"
    };

    lines.forEach(line => {
        const lineClean = line.trim();
        if (!lineClean) return;

        // 🛡️ CONTROL DE CONTENEDORES (Evita procesar listas internas de recuadros o notas)
        if (lineClean.toLowerCase().includes("[recuadro:]") || lineClean.toLowerCase().includes("tema")) { dentroDeRecuadro = true; }
        if (lineClean.toLowerCase().includes("[fin de recuadro]")) { dentroDeRecuadro = false; return; }
        if (lineClean.toLowerCase().includes("[nota:]")) { dentroDeNota = true; }
        if (lineClean.toLowerCase().includes("[fin de nota]")) { dentroDeNota = false; return; }

        // Si estamos dentro de un recuadro informativo, extraemos las citas pero NO creamos preguntas nuevas
        const esPreguntaPotencial = pregRegex.exec(lineClean);
        
        if (esPreguntaPotencial && !dentroDeRecuadro && !dentroDeNota) {
            // Normalizamos la llave del bloque (ej: "14,15" -> "14-15")
            let numerosExtraidos = esPreguntaPotencial[1].replace(/\s+/g, '').replace(/,/g, '-');
            activeKey = numerosExtraidos;

            let preguntaTextoLimpio = lineClean.replace(/^\s*\d+[\d\s,.-]*(?:[a-z]\))?[\s.-]+\s*/i, '');
            mapaEstudio[activeKey] = { textoOriginal: preguntaTextoLimpio, citas: [], textosCompletosBLB: [] };
        }

        // Si hay una sección activa de cuestionario, capturamos los paréntesis
        if (activeKey !== null) {
            citaRegex.lastIndex = 0;
            const parentesisEncontrados = lineClean.match(citaRegex);
            
            if (parentesisEncontrados) {
                parentesisEncontrados.forEach(parentesis => {
                    let contenidoParentesis = parentesis.replace(/[()]/g, '').trim();
                    
                    let contenidoBajo = contenidoParentesis.toLowerCase();
                    if (contenidoBajo.includes("picture") || contenidoBajo.includes("read") || 
                        contenidoBajo.includes("nota") || contenidoBajo.includes("imagen") || 
                        contenidoBajo.includes("leyenda")) return;
                    
                    const partesCitas = contenidoParentesis.split(';');
                    partesCitas.forEach(parte => {
                        let fragmento = parte.trim();
                        
                        // Normalización de rangos textuales
                        fragmento = fragmento
                            .replace(/[ª°º]/g, '')
                            .replace(/\b(?:a\s+los|de)\b/gi, '')
                            .replace(/\s+a\s+(\d+)/i, '-$1')     
                            .replace(/(\d+)[a-z]\b/i, '$1');     

                        const estructuraMatch = fragmento.match(/^(.*?)\s+(?:capítulo|cap\.?)\s*(\d+)\s*(?:versículos|versículo|vers?\.?)?\s*([\d\s,.-]+)/i);

                        if (estructuraMatch) {
                            let libroTextoCrudo = estructuraMatch[1].trim().toLowerCase();
                            let capituloBase = estructuraMatch[2].trim();
                            let versiculosCapturados = estructuraMatch[3].trim();

                            if (libroTextoCrudo === "compare" || libroTextoCrudo === "lea" || libroTextoCrudo === "vea") return;

                            let cadenaVersiculos = versiculosCapturados.replace(/\s+/g, ''); 
                            let libroEstandar = "";
                            
                            if (traductorEspanolBLB[libroTextoCrudo]) {
                                libroEstandar = traductorEspanolBLB[libroTextoCrudo];
                            } else {
                                for (const [key, value] of Object.entries(bookMapping)) {
                                    if (libroTextoCrudo.includes(key.toLowerCase()) || key.toLowerCase().includes(libroTextoCrudo)) {
                                        libroEstandar = value;
                                        break;
                                    }
                                }
                            }

                            if (libroEstandar) {
                                const llaveAgrupadora = `${libroEstandar} ${capituloBase}`;
                                if (!agrupadorCitasBLB[llaveAgrupadora]) {
                                    agrupadorCitasBLB[llaveAgrupadora] = [];
                                }

                                const versiculosSeparados = cadenaVersiculos.split(',');
                                versiculosSeparados.forEach(ver => {
                                    let verLimpio = ver.trim();
                                    if (!verLimpio) return;
                                    
                                    // Guardamos la cita estructurada vinculada a la llave compuesta activa
                                    mapaEstudio[activeKey].citas.push(`${libroEstandar} ${capituloBase}:${verLimpio}`);
                                    agrupadorCitasBLB[llaveAgrupadora].push(verLimpio);
                                });
                            }
                        }
                    });
                });
            }
        }
    });

    if (Object.keys(mapaEstudio).length === 0) {
        statusDiv.className = 'error'; statusDiv.innerText = 'No se estructuró ninguna pregunta. Revisa el formato.';
        return;
    }

    localStorage.setItem('mapaEstudioActivo', JSON.stringify(mapaEstudio));

    const bloquesCitasFormateados = [];
    for (const [libroYCapitulo, listaVersiculos] of Object.entries(agrupadorCitasBLB)) {
        const versiculosUnicos = [...new Set(listaVersiculos)];
        const versiculosUnidosConComas = versiculosUnicos.join(',');
        bloquesCitasFormateados.push(`${libroYCapitulo}:${versiculosUnidosConComas}`);
    }

    const blbSearchString = bloquesCitasFormateados.join('; ');

    console.log("Cadena perfecta unificada para BLB:", blbSearchString);

    if (navigator.clipboard && window.isSecureContext) {
        try {
            await navigator.clipboard.writeText(blbSearchString);
            statusDiv.className = 'success'; statusDiv.innerText = '¡Fase 1 Éxito! Cadena copiada para BLB.';
            txtArea.value = ''; 
        } catch (err) {
            statusDiv.className = 'error'; statusDiv.innerText = 'Error al escribir en el portapapeles.';
        }
    } else {
        const textAreaTemporal = document.createElement("textarea");
        textAreaTemporal.value = blbSearchString;
        document.body.appendChild(textAreaTemporal);
        textAreaTemporal.select();
        try {
            document.execCommand('copy');
statusDiv.className = 'success'; 
statusDiv.innerText = '¡Fase 1 Éxito! Cadena copiada para BLB.';
txtArea.value = '';} 
catch (err) {statusDiv.className = 'error'; 
statusDiv.innerText = 'Error al copiar la cadena.';
}
document.body.removeChild(textAreaTemporal);}}














async function matchBLBTextWithMap() {
    const statusDiv = document.getElementById('status');
    const txtArea = document.getElementById('sourceText');
    statusDiv.className = ''; statusDiv.innerText = 'Sincronizando textos...';

    const mapaGuardado = localStorage.getItem('mapaEstudioActivo');
    const principioGuardado = localStorage.getItem('principioOrganizador') || "";
    if (!mapaGuardado) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Error: No existe un mapa activo en memoria.';
        return;
    }
    const mapaEstudio = JSON.parse(mapaGuardado);

    const blbTextoCompleto = txtArea.value;
    if (!blbTextoCompleto.trim()) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Por favor, pega los textos traídos de BLB.';
        return;
    }

    const lineasBLB = blbTextoCompleto.split('\n').map(l => l.trim()).filter(l => l !== "");

    Object.keys(mapaEstudio).forEach(id => {
        const nodo = mapaEstudio[id]; nodo.textosCompletosBLB = [];
        nodo.citas.forEach(cita => {
            const textoEncontrado = lineasBLB.find(linea => linea.toLowerCase().includes(cita.toLowerCase()));
            if (textoEncontrado) nodo.textosCompletosBLB.push(textoEncontrado);
        });
    });

    let textoFinalConsolidado = principioGuardado;

    Object.keys(mapaEstudio).forEach(id => {
        const nodo = mapaEstudio[id];
        textoFinalConsolidado += `${id}. ${nodo.textoOriginal}\n`;
        if (nodo.textosCompletosBLB.length > 0) {
            const versiculosUnicos = [...new Set(nodo.textosCompletosBLB)];
            versiculosUnicos.forEach(vTxt => { textoFinalConsolidado += `   [BLB] ${vTxt}\n`; });
        } else if (nodo.citas.length > 0) {
            const citasUnicas = [...new Set(nodo.citas)];
            textoFinalConsolidado += `   [Pendiente] Citas: ${citasUnicas.join(', ')}\n`;
        }
        textoFinalConsolidado += `\n`; 
    });

    // 🎯 INYECTOR DE CIERRE BLINDADO: Se acopla de forma directa al string final
    textoFinalConsolidado += "[Box] How Would You Answer?\n\n";
    textoFinalConsolidado += " As described in the Bible, what is meant by “comfort”?\n";
    textoFinalConsolidado += " How can we comfort others?\n";
    textoFinalConsolidado += " What can we do when we need comfort? [End of box]\n\n";
    textoFinalConsolidado += "/* lo puedo hacer yo */";

    try {
        await navigator.clipboard.writeText(textoFinalConsolidado.trim());
        statusDiv.className = 'success'; statusDiv.innerText = '¡Fase 2 Éxito! Cuestionario completo copiado al portapapeles.';
        txtArea.value = ''; 
        localStorage.removeItem('mapaEstudioActivo'); 
        localStorage.removeItem('principioOrganizador'); 
    } catch (err) {
        statusDiv.className = 'error'; statusDiv.innerText = 'Error al escribir el resultado final.';
    }
}
</script>
